<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Para ti</title>
    <style>
      body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        /* Fondo con gradiente animado suave */
        background: linear-gradient(-45deg, #1a1a2e, #16213e, #4a1c40, #0f3460);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        overflow: hidden;
        height: 100vh;
        color: #f0f0f0;
      }

      /* Animación del fondo */
      @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      .main-container {
        display: flex;
        flex-direction: column;
        justify-content: center; 
        align-items: center; 
        width: 100%;
        height: 100%;
        padding: 0 20px;
        box-sizing: border-box;
      }

      .mensaje {
        max-width: 650px; /* Evita que el texto sea muy largo en pantallas grandes */
        text-align: center;
        font-size: 1.5em; 
        line-height: 1.6;
        margin-bottom: 40px; 
        text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.7);
        font-weight: 300;
        letter-spacing: 0.5px;
      }

      .escena {
        perspective: 1000px;
      }

      .card {
        position: relative;
        width: 280px; /* Tarjeta un poco más grande para apreciar el video */
        height: 380px;
        cursor: pointer;
        transform-style: preserve-3d;
        border-radius: 15px;
        transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      }

      .card:hover {
        transform: rotateY(180deg);
        box-shadow: 0 15px 40px rgba(231, 21, 109, 0.4);
      }

      .face_card {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border-radius: 15px;
        overflow: hidden;
        backface-visibility: hidden;
        background-color: #000; /* Fondo negro por defecto */
      }

      .face_card img,
      .face_card video {
        width: 100%;
        height: 100%;
        object-fit: cover; /* Asegura que la imagen/video llene la tarjeta sin deformarse */
      }

      .face_card.face_card_back {
        transform: rotateY(180deg);
      }

      .card:hover .face_card.face_card_front {
        filter: brightness(1.2);
      }
    </style>
  </head>

  <body>
    <div class="main-container">
      
      <p class="mensaje">
        Hace mucho quería decirte algo, pero no he tenido la valentía de decirte, sin embargo, hoy me he animado y qué mejor forma de hacerlo desde el corazón y haciendo lo mejor que sé hacer, programar.
      </p>

      <div class="escena">
        <div class="card">
          
          <div class="face_card face_card_front">
            <img src="b1.jpg" alt="Portada" />
          </div>

          <div class="face_card face_card_back">
            <video autoplay loop muted playsinline>
              <source src="tu_video.mp4" type="video/mp4" />
              Tu navegador no soporta la reproducción de videos.
            </video>
          </div>

        </div>
      </div>
    </div>
  </body>
</html>
